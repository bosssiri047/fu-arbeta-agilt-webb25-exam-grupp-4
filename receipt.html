<!doctype html>
<html lang="en">
  <head>
    <!-- Styles Start -->
    <link rel="stylesheet" href="styles/style.css" />
    <!-- Styles End -->
    <script src="./scripts/script.js" type="module" defer></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kvitto Sida</title>
  </head>
  <body>
    <!-- Header Start -->
    <header class="header">
      <a href="./index.html" class="header__logo-link">
        <img
          src="./res/logo_transparent.png"
          alt="Small YumYum Foodtruck logo"
          class="header__logo-img"
        />
      </a>
      <a href="./cart.html" class="header__cart-link">
        <img
          src="./res/cart_icon.svg"
          alt="Go to cart"
          class="header__car-img"
        />
        <span class="header__cart-count" id="cartCount">3</span>
      </a>
    </header>
    <!-- Header End -->
    <!-- Kvitto Wrapper Start -->
    <main class="kvitto-wrapper" id="kvittoWrapper">
      <section class="kvitto">
        <figure class="mainherologo" id="mainLogo">
          <img class="kvittohero" src="res/logo.png" alt="mainhero-img" />
          <p class="kvittoid" id="kvittoId">#4kjwsdf234k</p>
        </figure>
      </section>
      <!-- Hero End -->
      <!-- Kvitto Start -->
      <section class="kvitto-wrapper-info">
        <h2 class="kvitto-title" id="kvittoTitle">KVITTO</h2>
        <ul class="kvitto-list" id="kvittoList">
          <!-- här fyller JS i alla produkter -->
        </ul>
        <!-- kvitto footer start -->
        <section>
          <p class="kvitto-totalsumma" id="kvittoTotalSumma">Total summa</p>
          <p class="kvitto-moms" id="kvittoMoms">ink</p>
          <p class="kvitto-total-price" id="kvittoTotalPrice"></p>
        </section>
        <!-- kvitto footer end -->
      </section>

      <section class="kvittoorder" id="kvittoOrder">
        <button class="button makeorderBtn" id="makeOrderBtn">
          Gör en ny Beställning
        </button>
      </section>
    </main>
    <!-- Kvitto Wrapper End -->
  </body>
</html>
