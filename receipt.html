<!doctype html>
<html lang="en">
  <head>
    <!-- Styles Start -->
    <link rel="stylesheet" href="styles/style.css" />
    <!-- Styles End -->
    <script src="./scripts/script.js" type="module" defer></script>
    <script></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kvitto Sida</title>
  </head>
  <body>
    <!-- Header Start -->
    <header class="header">
      <a href="./index.html" class="header__logo-link">
        <img
          src="./res/logo_transparent.png"
          alt="Small YumYum Foodtruck logo"
          class="header__logo-img"
        />
      </a>
      <a href="./cart.html" class="header__cart-link">
        <img
          src="./res/cart_icon.svg"
          alt="Go to cart"
          class="header__car-img"
        />
        <span class="header__cart-count" id="cartCount">3</span>
      </a>
    </header>
    <!-- Header End -->
    <!-- Kvitto Wrapper Start -->
    <main class="kvitto-wrapper">
      <section class="kvitto">
        <figure class="mainherologo">
          <img class="kvittohero" src="res/logo.png" alt="mainhero-img" />
          <p class="kvittoid"></p>
        </figure>
      </section>

      <section class="kvitto-wrapper-info">
        <h2 class="kvitto-title">KVITTO</h2>
        <ul class="kvitto-list"></ul>

        <section>
          <p class="kvitto-totalsumma"><strong>TOTALT</strong></p>
          <p class="kvitto-moms">inkl 20% moms</p>
          <p class="kvitto-total-price"></p>
        </section>
      </section>

      <section class="kvittoorder">
        <button class="button makeorderBtn">Gör en ny Beställning</button>
      </section>
    </main>
    <!-- Kvitto Wrapper End -->
  </body>
</html>
