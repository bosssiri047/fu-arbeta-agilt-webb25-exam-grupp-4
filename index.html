<!doctype html>
<html lang="en">
	<head>
		<!-- styles start -->
		<link rel="stylesheet" href="styles/style.css" />
		<!-- styles end -->
		<!-- script start -->
		<script type="module" src="scripts/script.js"></script>
		<!-- script end -->
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>landing page</title>
	</head>
	<body>
		<main class="main-container" id="mainContainer">
			<!-- Header Start -->
			<header class="header">
				<a href="./index.html" class="header__logo-link">
					<img
						src="./res/logo_transparent.png"
						alt="Small YumYum Foodtruck logo"
						class="header__logo-img"
					/>
				</a>
				<a href="./cart.html" class="header__cart-link">
					<img
						src="./res/cart_icon.svg"
						alt="Go to cart"
						class="header__car-img"
					/>
					<span class="header__cart-count" id="cartCount">3</span>
				</a>
			</header>
			<!-- Header End -->

			<!-- Hero start -->
			<section class="mainhero" id="mainHero">
				<figure class="mainhero__logo" id="mainLogo">
					<img src="res/logo.png" alt="mainhero-img" />
				</figure>
				<!-- Om Oss Start -->
				<article class="aboutus">
					<!-- <h2 class="aboutus__header">Välkommen till</h2> -->
					<p class="aboutus__info">
						100% YUM YUM I över 40 år har vi lagat den godaste
						asiatiska maten i stan. <br />Välkommen till äkta
						smaker.
					</p>
				</article>
				<!-- Call to action Start -->
				<section class="cta" id="ctaBtn">
					<a
						href="./menu.html"
						class="button buttonorder"
						id="orderBtn"
					>
						Beställ nu
					</a>
				</section>
				<!-- Call to action End -->
				<!-- Om oss End -->
				<!-- hero end -->
			</section>
			<!-- Hero end -->
		</main>
	</body>
</html>
